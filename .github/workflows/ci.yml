name: AFIP Core Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  core-validation:
    name: Core Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Validate Financial Naming Standard
        run: python tools/validate_financial_naming.py

      - name: Run AFIP simulation
        run: python afip.py simulate

      - name: Run tests
        run: pytest -q
