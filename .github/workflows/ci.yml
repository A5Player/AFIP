name: AFIP Core Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  core-validation:
    name: Core Validation
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      AFIP_CI: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Validate Financial Naming Standard
        run: python tools/validate_financial_naming.py

      - name: Run AFIP simulation
        run: python afip.py simulate

      - name: Run tests
        run: python -m pytest -q
